# This workflow will lint, typecheck, and test the pymend repo
name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Installation
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
      - name: Check formatting with ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: "format --check"
      - name: Typecheck with pyright
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef # v3

      - name: Thorough check with pylint
        run: uv run pylint src/pymend
      - name: Test with pytest
        run: |
          uv run coverage run -m pytest --durations=10
          uv run coverage report -m
          uv run coverage json
          uv run coverage html
      - name: Archive code coverage results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: code-coverage-report-${{ matrix.python-version }}
          path: htmlcov/
      - name: Verify tests pass after regenerating expected files
        run: |
          uv run python scripts/regen_expected.py tests/test_pymend/ -q
          uv run pytest tests/test_pymend/ -q
