name: release

on:
  workflow_dispatch:
    inputs:
      base_bump:
        description: "Base version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - stable
      pre_release:
        description: "Pre-release type (optional)"
        required: false
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - dev

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new }}
    environment: pypi
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Compute new version
        id: version
        env:
          BASE: ${{ inputs.base_bump }}
          PRE: ${{ inputs.pre_release }}
        run: |
          set -euo pipefail

          # Capture current version
          OLD=$(uv version --short)
          echo "current=$OLD" >> "$GITHUB_OUTPUT"
          echo "Old version: $OLD"

          # Run uv version with one or two --bump flags depending on PRE
          if [ -n "$PRE" ] && [ "$PRE" != "none" ]; then
            uv version --bump "$BASE" --bump "$PRE"
          else
            uv version --bump "$BASE"
          fi

          # Capture new version
          NEW=$(uv version --short)
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $OLD → $NEW"

      - name: Bump version in source files
        env:
          OLD: ${{ steps.version.outputs.current }}
          NEW: ${{ steps.version.outputs.new }}
        run: |
          replace_once() {
            local use_regex=false
            if [ "$1" = "-r" ]; then
              use_regex=true
              shift
            fi
            local pattern="$1" replacement="$2"; shift 2
            for file in "$@"; do
              if [ "$use_regex" = true ]; then
                count=$(grep -cE "$pattern" "$file" ||  true)
              else
                count=$(grep -Fc "$pattern" "$file" ||  true)
              fi
              if [ "$count" -ne 1 ]; then
                echo "::error::Expected 1 match of '$pattern' in $file, found $count"
                exit 1
              fi
              if [ "$use_regex" = true ]; then
                sed -i -E "s|$pattern|$replacement|" "$file"
              else
                sed -i "s|$pattern|$replacement|" "$file"
              fi
            done
          }
          YEAR=$(date +%Y)
          replace_once "__version__ = \"$OLD\"" "__version__ = \"$NEW\"" src/pymend/pymend.py src/pymend/file_parser.py src/pymend/docstring_info.py
          replace_once "release = \"$OLD\"" "release = \"$NEW\"" docs/conf.py
          replace_once "Pymend v$OLD" "Pymend v$NEW" README.rst
          replace_once "rev: \"v$OLD\"" "rev: \"v$NEW\"" README.rst
          replace_once "pymend, $OLD" "pymend, $NEW" docs/usage_and_configuration/the_basics.rst
          replace_once -r "Copyright 2023-[0-9]{4}" "Copyright 2023-$YEAR" src/pymend/docstring_info.py src/pymend/file_parser.py

      - name: Sync lockfile and install project
        run: uv sync --all-extras --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest -q

      - name: Commit and tag
        env:
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_ID: ${{ github.actor_id }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "${GIT_AUTHOR_ID}+${GIT_AUTHOR_NAME}@users.noreply.github.com"
          git fetch --tags
          git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1 && {
            echo "Tag already exists"
            exit 1
          }
          git add pyproject.toml uv.lock \
            src/pymend/pymend.py src/pymend/file_parser.py src/pymend/docstring_info.py \
            docs/conf.py README.rst docs/usage_and_configuration/the_basics.rst
          git commit -m "Bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin "HEAD:${REF_NAME}" "v${NEW_VERSION}"

  build:
    name: Build distribution
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ needs.bump.outputs.new_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Build sdist and wheel
        run: uv build

      - name: Verify distributions
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs:
      - bump
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: v${{ needs.bump.outputs.new_version }}
          generate_release_notes: true
          files: dist/*

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
